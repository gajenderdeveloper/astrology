  <!-- Calender JS File -->
 <script>
  let today = new Date();
  let currentMonth = today.getMonth();
  let currentYear = today.getFullYear();
  let bookedDates = ['2023-12-05', '2023-12-15']; // Add booked dates in 'YYYY-MM-DD' format
  
  document.getElementById("currentMonthYear").textContent = `${today.toLocaleString('default', { month: 'long' })} ${currentYear}`;
  
  function generateCalendar(year, month) {
    const calendarBody = document.getElementById('calendar-body');
    calendarBody.innerHTML = '';
  
    const firstDay = new Date(year, month).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
  
    // Update the current month and year display
    document.getElementById("currentMonthYear").textContent = `${new Date(year, month).toLocaleString('default', { month: 'long' })} ${year}`;
  
    let date = 1;
    for (let i = 0; i < 6; i++) {
      let row = document.createElement('tr');
      for (let j = 0; j < 7; j++) {
        let cell = document.createElement('td');
        let cellText = document.createTextNode('');
  
        if (i === 0 && j < firstDay) {
          // Empty cells at the start
          cell.appendChild(cellText);
          row.appendChild(cell);
        } else if (date > daysInMonth) {
          // Stop if dates exceed the total number of days in the month
          break;
        } else {
          let currentDate = `${year}-${String(month + 1).padStart(2, '0')}-${String(date).padStart(2, '0')}`;
          cellText = document.createTextNode(date);
          cell.appendChild(cellText);
  
          // Highlight the current date
          if (date === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
            cell.classList.add('current-day');
          }
  
          // Mark booked dates
          if (bookedDates.includes(currentDate)) {
            cell.classList.add('booked');
          } else {
            // Allow selecting available dates
            cell.addEventListener('click', function () {
              document.querySelectorAll('.calendar-table td').forEach(td => td.classList.remove('selected'));
              cell.classList.add('selected');
              alert("Selected date: " + currentDate);
            });
          }
  
          row.appendChild(cell);
          date++;
        }
      }
      calendarBody.appendChild(row);
    }
  }
  
  function updateCalendar() {
    generateCalendar(currentYear, currentMonth);
  }
  
  document.getElementById('prevYear').addEventListener('click', function () {
    if (currentYear > today.getFullYear() - 99) {
      currentYear--;
      updateCalendar();
    }
  });
  
  document.getElementById('nextYear').addEventListener('click', function () {
    if (currentYear < today.getFullYear() + 99) {
      currentYear++;
      updateCalendar();
    }
  });
  
  // Add event listeners for month navigation
  document.getElementById('prevMonth').addEventListener('click', function() {
    if (currentMonth === 0) {
      currentMonth = 11;
      currentYear--;
    } else {
      currentMonth--;
    }
    updateCalendar();
  });
  
  document.getElementById('nextMonth').addEventListener('click', function() {
    if (currentMonth === 11) {
      currentMonth = 0;
      currentYear++;
    } else {
      currentMonth++;
    }
    updateCalendar();
  });
  
  // Initialize the calendar
  generateCalendar(currentYear, currentMonth);
  </script>
